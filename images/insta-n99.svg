  <text x="1026" y="958" font-family="Arial, sans-serif" font-size="22" fill="#FF4B00" font-weight="bold" text-anchor="end">@kims_community_travel</text>

  <rect x="0" y="1073" width="1080" height="7" fill="url(#orange)"/>
