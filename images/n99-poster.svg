<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#1a1f2e"/>
    </linearGradient>
    <linearGradient id="orangeBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF4B00"/>
      <stop offset="100%" stop-color="#ff7a3d"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1350" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="900" cy="120" r="300" fill="#FF4B00" opacity="0.06"/>
  <circle cx="150" cy="1200" r="250" fill="#FF4B00" opacity="0.05"/>

  <!-- Top orange bar -->
  <rect x="0" y="0" width="1080" height="8" fill="url(#orangeBar)"/>

  <!-- KCT label -->
  <text x="64" y="80" font-family="Georgia, serif" font-size="22" fill="#FF4B00" font-weight="bold" letter-spacing="4">KIM'S COMMUNITY TRAVEL</text>

  <!-- Trip code badge -->
  <rect x="64" y="104" width="110" height="40" rx="8" fill="#FF4B00"/>
  <text x="119" y="130" font-family="Georgia, serif" font-size="22" fill="white" font-weight="bold" text-anchor="middle">N99</text>

  <!-- Gov sponsored badge -->
  <rect x="188" y="104" width="280" height="40" rx="8" fill="#ffffff" fill-opacity="0.1"/>
  <text x="328" y="130" font-family="Arial, sans-serif" font-size="18" fill="#ffffff" opacity="0.8" text-anchor="middle">🇰🇷 Government Sponsored</text>

  <!-- Main title -->
  <text x="64" y="240" font-family="Georgia, serif" font-size="72" fill="white" font-weight="bold">Seonbi</text>
  <text x="64" y="326" font-family="Georgia, serif" font-size="72" fill="white" font-weight="bold">Scholars,</text>
  <text x="64" y="412" font-family="Georgia, serif" font-size="72" fill="#FF4B00" font-weight="bold">Chunhyang</text>
  <text x="64" y="498" font-family="Georgia, serif" font-size="72" fill="white" font-weight="bold">&amp; Jeonju</text>

  <!-- Subtitle line -->
  <rect x="64" y="526" width="80" height="4" rx="2" fill="#FF4B00"/>
  <text x="64" y="568" font-family="Arial, sans-serif" font-size="26" fill="white" opacity="0.65">2 Days · 1 Night · Korea</text>

  <!-- Date & Meeting card -->
  <rect x="64" y="606" width="952" height="130" rx="16" fill="url(#cardGrad)" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <text x="104" y="652" font-family="Arial, sans-serif" font-size="18" fill="#FF4B00" font-weight="bold" letter-spacing="2">DATES</text>
  <text x="104" y="686" font-family="Georgia, serif" font-size="30" fill="white" font-weight="bold">May 2–3, 2026 (Sat–Sun)</text>
  <text x="104" y="718" font-family="Arial, sans-serif" font-size="20" fill="white" opacity="0.55">Meet 06:45 · Depart 07:00 · Yongsan Station Exit 1</text>

  <!-- Destinations -->
  <text x="64" y="796" font-family="Arial, sans-serif" font-size="18" fill="#FF4B00" font-weight="bold" letter-spacing="2">DESTINATIONS</text>

  <!-- Dest cards row -->
  <rect x="64" y="816" width="288" height="88" rx="12" fill="url(#cardGrad)" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <text x="208" y="851" font-family="Arial, sans-serif" font-size="28" fill="white" text-anchor="middle">⛩️</text>
  <text x="208" y="882" font-family="Georgia, serif" font-size="22" fill="white" font-weight="bold" text-anchor="middle">Yeongju</text>
  <text x="208" y="903" font-family="Arial, sans-serif" font-size="16" fill="white" opacity="0.5" text-anchor="middle">Seonbi Festival</text>

  <rect x="380" y="816" width="288" height="88" rx="12" fill="url(#cardGrad)" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <text x="524" y="851" font-family="Arial, sans-serif" font-size="28" fill="white" text-anchor="middle">🌸</text>
  <text x="524" y="882" font-family="Georgia, serif" font-size="22" fill="white" font-weight="bold" text-anchor="middle">Namwon</text>
  <text x="524" y="903" font-family="Arial, sans-serif" font-size="16" fill="white" opacity="0.5" text-anchor="middle">Chunhyang Festival</text>

  <rect x="696" y="816" width="320" height="88" rx="12" fill="url(#cardGrad)" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <text x="856" y="851" font-family="Arial, sans-serif" font-size="28" fill="white" text-anchor="middle">🏯</text>
  <text x="856" y="882" font-family="Georgia, serif" font-size="22" fill="white" font-weight="bold" text-anchor="middle">Jeonju</text>
  <text x="856" y="903" font-family="Arial, sans-serif" font-size="16" fill="white" opacity="0.5" text-anchor="middle">Hanok Village</text>

  <!-- Highlights -->
  <text x="64" y="974" font-family="Arial, sans-serif" font-size="18" fill="#FF4B00" font-weight="bold" letter-spacing="2">HIGHLIGHTS</text>
  <text x="64" y="1012" font-family="Arial, sans-serif" font-size="24" fill="white" opacity="0.85">✦  Buseoksa Temple — Silla-era Buddhist landmark</text>
  <text x="64" y="1052" font-family="Arial, sans-serif" font-size="24" fill="white" opacity="0.85">✦  Yeongju Seonbi Culture Festival</text>
  <text x="64" y="1092" font-family="Arial, sans-serif" font-size="24" fill="white" opacity="0.85">✦  Namwon Chunhyang Festival (evening)</text>
  <text x="64" y="1132" font-family="Arial, sans-serif" font-size="24" fill="white" opacity="0.85">✦  Jeonju Hanok Village &amp; Gyeonggijeon</text>
  <text x="64" y="1172" font-family="Arial, sans-serif" font-size="24" fill="white" opacity="0.85">✦  Bus · 1 Night · 3 Meals · All entry fees</text>

  <!-- Divider -->
  <rect x="64" y="1208" width="952" height="1" fill="#ffffff" fill-opacity="0.1"/>

  <!-- Price & CTA row -->
  <text x="64" y="1270" font-family="Arial, sans-serif" font-size="20" fill="white" opacity="0.5">Price</text>
  <text x="64" y="1308" font-family="Georgia, serif" font-size="48" fill="white" font-weight="bold">10 EUR</text>
  <text x="300" y="1308" font-family="Arial, sans-serif" font-size="20" fill="white" opacity="0.45">exchange &amp; intl students</text>
  <text x="300" y="1334" font-family="Arial, sans-serif" font-size="20" fill="white" opacity="0.45">20 EUR for other foreigners</text>

  <!-- Instagram handle -->
  <text x="1016" y="1308" font-family="Arial, sans-serif" font-size="22" fill="#FF4B00" font-weight="bold" text-anchor="end">@kims_community_travel</text>
  <text x="1016" y="1338" font-family="Arial, sans-serif" font-size="18" fill="white" opacity="0.4" text-anchor="end">kimscommunitytravel.com</text>

  <!-- Bottom bar -->
  <rect x="0" y="1342" width="1080" height="8" fill="url(#orangeBar)"/>
</svg>
