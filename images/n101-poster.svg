<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#1a1f2e"/>
    </linearGradient>
    <linearGradient id="orangeBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF4B00"/>
      <stop offset="100%" stop-color="#ff7a3d"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1350" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="200" cy="200" r="320" fill="#FF4B00" opacity="0.06"/>
  <circle cx="950" cy="1150" r="260" fill="#FF4B00" opacity="0.05"/>

  <!-- Top orange bar -->
  <rect x="0" y="0" width="1080" height="8" fill="url(#orangeBar)"/>

  <!-- KCT label -->
  <text x="64" y="80" font-family="Georgia, serif" font-size="22" fill="#FF4B00" font-weight="bold" letter-spacing="4">KIM'S COMMUNITY TRAVEL</text>

  <!-- Trip code badge -->
  <rect x="64" y="104" width="128" height="40" rx="8" fill="#FF4B00"/>
  <text x="128" y="130" font-family="Georgia, serif" font-size="22" fill="white" font-weight="bold" text-anchor="middle">N101</text>

  <!-- Gov sponsored badge -->
  <rect x="206" y="104" width="280" height="40" rx="8" fill="#ffffff" fill-opacity="0.1"/>
  <text x="346" y="130" font-family="Arial, sans-serif" font-size="18" fill="#ffffff" opacity="0.8" text-anchor="middle">🇰🇷 Government Sponsored</text>

  <!-- Main title -->
  <text x="64" y="240" font-family="Georgia, serif" font-size="66" fill="#FF4B00" font-weight="bold">Chunhyang</text>
  <text x="64" y="318" font-family="Georgia, serif" font-size="66" fill="white" font-weight="bold">Festival &amp;</text>
  <text x="64" y="396" font-family="Georgia, serif" font-size="66" fill="white" font-weight="bold">Yeoju Bicycle</text>
  <text x="64" y="474" font-family="Georgia, serif" font-size="66" fill="#FF4B00" font-weight="bold">Festival</text>

  <!-- Subtitle line -->
  <rect x="64" y="502" width="80" height="4" rx="2" fill="#FF4B00"/>
  <text x="64" y="544" font-family="Arial, sans-serif" font-size="26" fill="white" opacity="0.65">2 Days · 1 Night · Korea · Golden Week</text>

  <!-- Date & Meeting card -->
  <rect x="64" y="582" width="952" height="130" rx="16" fill="url(#cardGrad)" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <text x="104" y="628" font-family="Arial, sans-serif" font-size="18" fill="#FF4B00" font-weight="bold" letter-spacing="2">DATES</text>
  <text x="104" y="662" font-family="Georgia, serif" font-size="30" fill="white" font-weight="bold">May 4–5, 2026 (Mon–Tue)</text>
  <text x="104" y="694" font-family="Arial, sans-serif" font-size="20" fill="white" opacity="0.55">Meet 06:45 · Depart 07:00 · Yongsan Station Exit 1</text>

  <!-- Destinations -->
  <text x="64" y="772" font-family="Arial, sans-serif" font-size="18" fill="#FF4B00" font-weight="bold" letter-spacing="2">DESTINATIONS</text>

  <!-- Dest cards row -->
  <rect x="64" y="792" width="300" height="88" rx="12" fill="url(#cardGrad)" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <text x="214" y="827" font-family="Arial, sans-serif" font-size="28" fill="white" text-anchor="middle">🌸</text>
  <text x="214" y="858" font-family="Georgia, serif" font-size="22" fill="white" font-weight="bold" text-anchor="middle">Namwon</text>
  <text x="214" y="879" font-family="Arial, sans-serif" font-size="16" fill="white" opacity="0.5" text-anchor="middle">Chunhyang Festival</text>

  <rect x="390" y="792" width="300" height="88" rx="12" fill="url(#cardGrad)" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <text x="540" y="827" font-family="Arial, sans-serif" font-size="28" fill="white" text-anchor="middle">🚴</text>
  <text x="540" y="858" font-family="Georgia, serif" font-size="22" fill="white" font-weight="bold" text-anchor="middle">Yeoju</text>
  <text x="540" y="879" font-family="Arial, sans-serif" font-size="16" fill="white" opacity="0.5" text-anchor="middle">Bicycle Festival</text>

  <rect x="716" y="792" width="300" height="88" rx="12" fill="url(#cardGrad)" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <text x="866" y="827" font-family="Arial, sans-serif" font-size="28" fill="white" text-anchor="middle">🌷</text>
  <text x="866" y="858" font-family="Georgia, serif" font-size="22" fill="white" font-weight="bold" text-anchor="middle">Seoul</text>
  <text x="866" y="879" font-family="Arial, sans-serif" font-size="16" fill="white" opacity="0.5" text-anchor="middle">Spring Festa</text>

  <!-- Highlights -->
  <text x="64" y="950" font-family="Arial, sans-serif" font-size="18" fill="#FF4B00" font-weight="bold" letter-spacing="2">HIGHLIGHTS</text>
  <text x="64" y="988" font-family="Arial, sans-serif" font-size="24" fill="white" opacity="0.85">✦  Namwon Chunhyang Festival &amp; grand parade</text>
  <text x="64" y="1028" font-family="Arial, sans-serif" font-size="24" fill="white" opacity="0.85">✦  Kim Byeong-jong Art Museum, Namwon</text>
  <text x="64" y="1068" font-family="Arial, sans-serif" font-size="24" fill="white" opacity="0.85">✦  Overnight rural village stay &amp; dinner</text>
  <text x="64" y="1108" font-family="Arial, sans-serif" font-size="24" fill="white" opacity="0.85">✦  Yeoju Bicycle Festival by the riverside</text>
  <text x="64" y="1148" font-family="Arial, sans-serif" font-size="24" fill="white" opacity="0.85">✦  Seoul Spring Festa — free dispersal at end</text>
  <text x="64" y="1188" font-family="Arial, sans-serif" font-size="24" fill="white" opacity="0.85">✦  Bus · 1 Night · 3 Meals · All entry fees</text>

  <!-- Divider -->
  <rect x="64" y="1220" width="952" height="1" fill="#ffffff" fill-opacity="0.1"/>

  <!-- Price & CTA row -->
  <text x="64" y="1270" font-family="Arial, sans-serif" font-size="20" fill="white" opacity="0.5">Price</text>
  <text x="64" y="1308" font-family="Georgia, serif" font-size="48" fill="white" font-weight="bold">10 EUR</text>
  <text x="300" y="1308" font-family="Arial, sans-serif" font-size="20" fill="white" opacity="0.45">exchange &amp; intl students</text>
  <text x="300" y="1334" font-family="Arial, sans-serif" font-size="20" fill="white" opacity="0.45">20 EUR for other foreigners</text>

  <!-- Instagram handle -->
  <text x="1016" y="1308" font-family="Arial, sans-serif" font-size="22" fill="#FF4B00" font-weight="bold" text-anchor="end">@kims_community_travel</text>
  <text x="1016" y="1338" font-family="Arial, sans-serif" font-size="18" fill="white" opacity="0.4" text-anchor="end">kimscommunitytravel.com</text>

  <!-- Bottom bar -->
  <rect x="0" y="1342" width="1080" height="8" fill="url(#orangeBar)"/>
</svg>
