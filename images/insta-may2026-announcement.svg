<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#1a1f2e"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF4B00"/>
      <stop offset="100%" stop-color="#ff7a3d"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.03"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <circle cx="900" cy="150" r="350" fill="#FF4B00" opacity="0.07"/>
  <circle cx="100" cy="950" r="280" fill="#FF4B00" opacity="0.05"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="1080" height="7" fill="url(#orange)"/>

  <!-- KCT -->
  <text x="54" y="66" font-family="Georgia, serif" font-size="20" fill="#FF4B00" font-weight="bold" letter-spacing="4">KIM'S COMMUNITY TRAVEL</text>

  <!-- Label -->
  <text x="54" y="118" font-family="Arial, sans-serif" font-size="17" fill="rgba(255,255,255,0.45)" letter-spacing="3">MAY 2026 · KOREA</text>

  <!-- Main headline -->
  <text x="54" y="208" font-family="Georgia, serif" font-size="90" fill="white" font-weight="bold">Two</text>
  <text x="54" y="306" font-family="Georgia, serif" font-size="90" fill="white" font-weight="bold">trips.</text>
  <text x="54" y="398" font-family="Georgia, serif" font-size="76" fill="#FF4B00" font-weight="bold">One epic May.</text>

  <!-- Divider -->
  <rect x="54" y="428" width="60" height="4" rx="2" fill="#FF4B00"/>

  <!-- Subtitle -->
  <text x="54" y="472" font-family="Arial, sans-serif" font-size="26" fill="rgba(255,255,255,0.6)">Government-sponsored · 1 night · 3 meals</text>
  <text x="54" y="508" font-family="Arial, sans-serif" font-size="26" fill="rgba(255,255,255,0.6)">Open to all international students</text>

  <!-- Trip cards -->
  <rect x="54" y="548" width="468" height="200" rx="16" fill="url(#card)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <rect x="54" y="548" width="5" height="200" rx="2" fill="#FF4B00"/>
  <text x="80" y="590" font-family="Arial, sans-serif" font-size="14" fill="#FF4B00" font-weight="bold" letter-spacing="2">N99 · MAY 2–3 (SAT–SUN)</text>
  <text x="80" y="622" font-family="Georgia, serif" font-size="22" fill="white" font-weight="bold">Seonbi, Chunhyang</text>
  <text x="80" y="650" font-family="Georgia, serif" font-size="22" fill="white" font-weight="bold">&amp; Jeonju</text>
  <text x="80" y="684" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.5)">⛩️ Buseoksa  🌸 Chunhyang  🏘️ Jeonju</text>
  <text x="80" y="724" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.35)">Yeongju · Namwon · Jeonju</text>

  <rect x="558" y="548" width="468" height="200" rx="16" fill="url(#card)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <rect x="558" y="548" width="5" height="200" rx="2" fill="#FF4B00"/>
  <text x="584" y="590" font-family="Arial, sans-serif" font-size="14" fill="#FF4B00" font-weight="bold" letter-spacing="2">N100 · MAY 4–5 (MON–TUE)</text>
  <text x="584" y="622" font-family="Georgia, serif" font-size="22" fill="white" font-weight="bold">Chunhyang &amp; Yeoju</text>
  <text x="584" y="650" font-family="Georgia, serif" font-size="22" fill="white" font-weight="bold">Bicycle Festival</text>
  <text x="584" y="684" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.5)">🌸 Parade  🚴 Yeoju  🌷 Seoul</text>
  <text x="584" y="724" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.35)">Namwon · Yeoju · Seoul Spring Festa</text>

  <!-- Price row -->
  <rect x="54" y="776" width="972" height="110" rx="16" fill="url(#card)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="100" y="822" font-family="Arial, sans-serif" font-size="17" fill="rgba(255,255,255,0.45)" letter-spacing="1">PRICE</text>
  <text x="100" y="864" font-family="Georgia, serif" font-size="46" fill="white" font-weight="bold">10 EUR</text>
  <text x="330" y="850" font-family="Arial, sans-serif" font-size="19" fill="rgba(255,255,255,0.45)">exchange &amp; international students</text>
  <text x="330" y="876" font-family="Arial, sans-serif" font-size="19" fill="rgba(255,255,255,0.35)">20 EUR for other foreigners</text>
  <text x="980" y="864" font-family="Arial, sans-serif" font-size="19" fill="rgba(255,255,255,0.35)" text-anchor="end">🚌 Bus  🛏️ 1 Night  🍱 3 Meals</text>

  <!-- CTA -->
  <text x="54" y="948" font-family="Arial, sans-serif" font-size="26" fill="rgba(255,255,255,0.35)">Book now →</text>
  <text x="54" y="978" font-family="Arial, sans-serif" font-size="26" fill="rgba(255,255,255,0.35)">kimscommunitytravel.com</text>

  <!-- Instagram -->
  <text x="1026" y="958" font-family="Arial, sans-serif" font-size="24" fill="#FF4B00" font-weight="bold" text-anchor="end">@kims_community_travel</text>

  <!-- Bottom bar -->
  <rect x="0" y="1073" width="1080" height="7" fill="url(#orange)"/>
</svg>
