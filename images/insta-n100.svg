  <text x="54" y="210" font-family="Georgia, serif" font-size="64" fill="#FF4B00" font-weight="bold">Chunhyang Festival</text>
  <text x="54" y="286" font-family="Georgia, serif" font-size="64" fill="white" font-weight="bold">&amp; Yeoju</text>
  <text x="54" y="362" font-family="Georgia, serif" font-size="64" fill="white" font-weight="bold">Bicycle Festival</text>

  <rect x="54" y="392" width="60" height="4" rx="2" fill="#FF4B00"/>

  <!-- Date -->
  <text x="54" y="436" font-family="Arial, sans-serif" font-size="26" fill="rgba(255,255,255,0.55)">📅 May 4–5, 2026 · Mon–Tue · Golden Week</text>

