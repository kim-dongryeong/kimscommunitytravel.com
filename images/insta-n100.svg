<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#1a1f2e"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF4B00"/>
      <stop offset="100%" stop-color="#ff7a3d"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.03"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <circle cx="120" cy="160" r="300" fill="#FF4B00" opacity="0.07"/>
  <circle cx="980" cy="950" r="240" fill="#FF4B00" opacity="0.05"/>

  <rect x="0" y="0" width="1080" height="7" fill="url(#orange)"/>

  <!-- Header -->
  <text x="54" y="66" font-family="Georgia, serif" font-size="20" fill="#FF4B00" font-weight="bold" letter-spacing="4">KIM'S COMMUNITY TRAVEL</text>
  <rect x="54" y="90" width="116" height="34" rx="7" fill="#FF4B00"/>
  <text x="112" y="114" font-family="Georgia, serif" font-size="20" fill="white" font-weight="bold" text-anchor="middle">N100</text>
  <rect x="184" y="90" width="250" height="34" rx="7" fill="rgba(255,255,255,0.08)"/>
  <text x="309" y="114" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.7)" text-anchor="middle">🇰🇷 Gov. Sponsored</text>

