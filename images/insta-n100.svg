  <rect x="54" y="468" width="300" height="80" rx="12" fill="url(#card)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="204" y="501" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle">🌸 Namwon</text>
  <text x="204" y="530" font-family="Arial, sans-serif" font-size="15" fill="rgba(255,255,255,0.4)" text-anchor="middle">Festival + Parade</text>

  <rect x="374" y="468" width="300" height="80" rx="12" fill="url(#card)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="524" y="501" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle">🚴 Yeoju</text>
  <text x="524" y="530" font-family="Arial, sans-serif" font-size="15" fill="rgba(255,255,255,0.4)" text-anchor="middle">Bicycle Festival</text>

  <rect x="694" y="468" width="332" height="80" rx="12" fill="url(#card)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="860" y="501" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle">🌷 Seoul</text>
