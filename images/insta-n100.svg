  <text x="310" y="948" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.4)">exchange &amp; intl students</text>
  <text x="310" y="972" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.3)">20 EUR other foreigners · link in bio</text>

  <text x="1026" y="958" font-family="Arial, sans-serif" font-size="22" fill="#FF4B00" font-weight="bold" text-anchor="end">@kims_community_travel</text>

  <rect x="0" y="1073" width="1080" height="7" fill="url(#orange)"/>
