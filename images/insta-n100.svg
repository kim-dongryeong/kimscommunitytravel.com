  <text x="54" y="614" font-family="Arial, sans-serif" font-size="16" fill="#FF4B00" font-weight="bold" letter-spacing="2">WHAT YOU'LL DO</text>
  <text x="54" y="652" font-family="Arial, sans-serif" font-size="23" fill="rgba(255,255,255,0.82)">✦  Chunhyang Festival grand street parade</text>
  <text x="54" y="688" font-family="Arial, sans-serif" font-size="23" fill="rgba(255,255,255,0.82)">✦  Kim Byeong-jong Art Museum, Namwon</text>
  <text x="54" y="724" font-family="Arial, sans-serif" font-size="23" fill="rgba(255,255,255,0.82)">✦  Overnight at a rural Korean village</text>
  <text x="54" y="760" font-family="Arial, sans-serif" font-size="23" fill="rgba(255,255,255,0.82)">✦  Yeoju Bicycle Festival by the riverside</text>
  <text x="54" y="796" font-family="Arial, sans-serif" font-size="23" fill="rgba(255,255,255,0.82)">✦  Seoul Spring Festa — final evening, free</text>
  <text x="54" y="832" font-family="Arial, sans-serif" font-size="23" fill="rgba(255,255,255,0.82)">✦  Bus · 1 night · 3 meals · all entry fees</text>

  <!-- Divider -->
  <rect x="54" y="868" width="972" height="1" fill="rgba(255,255,255,0.08)"/>

  <!-- Price & handle -->
  <text x="54" y="916" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.4)">PRICE</text>
