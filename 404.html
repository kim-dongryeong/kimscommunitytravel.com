<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found – Kim's Community Travel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .not-found {
      min-height: calc(100vh - 64px);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 24px;
    }
    .not-found-inner { max-width: 480px; }
    .not-found-emoji { font-size: 4rem; margin-bottom: 24px; line-height: 1; }
    .not-found-inner h1 { font-size: clamp(1.8rem, 4vw, 2.6rem); margin-bottom: 12px; }
    .not-found-inner p { font-size: 1.05rem; color: var(--mid); margin-bottom: 32px; }
    .not-found-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body>

<header class="site-nav">
  <div class="nav-inner container">
    <a href="/index.html" class="nav-logo">
      <img src="/images/logo.jpg" alt="Kim's Community Travel">
    </a>
    <ul class="nav-links">
      <li><a href="/index.html">Home</a></li>
      <li><a href="/about.html">About</a></li>
      <li><a href="/house.html">House</a></li>
    </ul>
    <button class="nav-burger" aria-label="Menu"><span></span><span></span><span></span></button>
  </div>
</header>
<nav class="nav-mobile">
  <ul>
    <li><a href="/index.html">Home</a></li>
    <li><a href="/about.html">About</a></li>
    <li><a href="/house.html">House</a></li>
  </ul>
</nav>

<div class="not-found">
  <div class="not-found-inner">
    <div class="not-found-emoji">🗺️</div>
    <h1>No page here yet</h1>
    <p>This trip or event doesn't have a detail page yet. Check back soon, or head back home to see what's available.</p>
    <div class="not-found-actions">
      <a href="/index.html" class="btn btn--orange btn--lg">← Back to Home</a>
      <a href="https://www.instagram.com/kims_community_travel" target="_blank" class="btn btn--ghost btn--lg">Follow on Instagram</a>
    </div>
  </div>
</div>

<footer class="site-footer">
  <div class="container">
    <div class="footer-bottom">
      <p>© 2026 Kim's Community Travel · Seoul, Korea</p>
      <p><a href="mailto:kdr@kimscommunitytravel.com" style="color:rgba(255,255,255,.4);">kdr@kimscommunitytravel.com</a></p>
    </div>
  </div>
</footer>

<script src="/js/main.js"></script>
</body>
</html>
